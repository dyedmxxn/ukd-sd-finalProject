{% extends 'music/base.html' %}

{% block content %}
    <h2>{{ title }}</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <div style="margin-top: 20px;">
            <button type="submit">Save</button>
            <a href="{% url 'song_list' %}" role="button" class="secondary outline">Cancel</a>
        </div>
    </form>
{% endblock %}
